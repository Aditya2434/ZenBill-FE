<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenBill - Invoice & Bill Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sidebar-bg: #0b0e1a;
        --sidebar-surface: rgba(255,255,255,0.04);
        --sidebar-border: rgba(255,255,255,0.07);
        --sidebar-text: rgba(255,255,255,0.55);
        --sidebar-text-active: #ffffff;
        --sidebar-accent: #6366f1;
        --sidebar-accent-glow: rgba(99,102,241,0.4);
        --content-bg: #f4f6fb;
        --card-bg: #ffffff;
        --card-border: rgba(99,102,241,0.08);
        --card-shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 20px rgba(99,102,241,0.06);
      }

      * { box-sizing: border-box; }

      body {
        font-family: "Inter", sans-serif;
        background: var(--content-bg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .font-display { font-family: "Plus Jakarta Sans", sans-serif; }





      /* ── Float ── */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-6px); }
      }
      .float-icon { animation: float 3s ease-in-out infinite; }

      /* ── Fade in up ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in-up {
        animation: fadeInUp 0.45s cubic-bezier(0.16,1,0.3,1) forwards;
      }



      /* ── Stat number count-up feel ── */
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .slide-in-left { animation: slideInLeft 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }

      /* ── Scrollbar styling ── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.45); }

      /* ── Card hover lift ── */
      .card-lift {
        transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
      }
      .card-lift:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(99,102,241,0.15) !important;
      }

      /* ── Gradient text ── */
      .gradient-text {
        background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── Quick action gradient border ── */
      .action-card {
        position: relative;
        background: white;
        border-radius: 14px;
        overflow: hidden;
      }
      .action-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 14px;
        padding: 1px;
        background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.1), transparent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      /* ── Badge ── */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 99px;
        letter-spacing: 0.03em;
      }
      .status-badge::before {
        content: '';
        width: 5px; height: 5px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.1.1/",
          "react": "https://aistudiocdn.com/react@^19.1.1",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
          "recharts": "https://aistudiocdn.com/recharts@^3.2.1"
        }
      }
    </script>
  </head>
  <body class="bg-gray-50 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
